<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Harmony - Efficiency Tool</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>TEXT GENERATOR</h2>
        
        <div class="section-title">1. Character Types</div>
        <div class="generator-options">
            <label><input type="checkbox" id="checkAlpha" checked> 半角英字</label>
            <label><input type="checkbox" id="checkNum" checked> 半角数字</label>
            <label><input type="checkbox" id="checkFull"> 全角文字</label>
            <label><input type="checkbox" id="checkSymbol"> 記号</label>
            <label><input type="checkbox" id="check4Byte"> 4バイト文字</label>
        </div>
        <div class="symbol-info">
            Symbols: <span>! $ % & ' ( ) * + - . : ; < > ? @ [ ¥ ] ^ _ { | } ~ = # /</span>
        </div>

        <div class="section-title" style="margin-top: 25px;">2. Generation Mode</div>
        <div class="mode-selector">
            <label><input type="radio" name="genMode" value="include" checked> 選択した種別を<b>使う</b> (Include)</label>
            <label><input type="radio" name="genMode" value="exclude"> 選択した種別を<b>除外する</b> (Exclude)</label>
        </div>

        <div class="section-title">3. Length</div>
        <input type="number" id="customLen" value="256" placeholder="文字数（例: 40）">

        <button class="primary generate-btn" onclick="generateRandomText()">GENERATE & COPY</button>
    </div>

    <div class="card">
        <h2>MAC ADDRESS</h2>
        
        <div class="section-title">Format Settings</div>
        <div class="mode-selector">
            <label><input type="radio" name="macSeparator" value=":" checked> コロン区切り (FF:EE:DD...)</label>
            <label><input type="radio" name="macSeparator" value="-"> ハイフン区切り (FF-EE-DD...)</label>
            <label><input type="radio" name="macSeparator" value=""> 区切りなし (FFEEDD...)</label>
        </div>

        <div class="generator-options" style="grid-template-columns: 1fr; margin-top: 10px;">
            <label><input type="checkbox" id="macUpper" checked> 大文字にする (UPPERCASE)</label>
        </div>

        <div class="section-title" style="margin-top: 20px;">Quantity</div>
        <input type="number" id="macCount" value="1" min="1" max="4000" placeholder="生成個数">

        <button class="primary generate-btn" onclick="generateMacAddress()">GENERATE & OUTPUT</button>
    </div>

    <script src="js/mac-gen.js"></script>

    <div class="card">
        <h2>DUMMY IMAGE</h2>
        
        <div class="section-title">Image Settings</div>
        <div class="input-row">
            <input type="number" id="imgW" placeholder="Width" value="800">
            <input type="number" id="imgH" placeholder="Height" value="450">
        </div>
        
        <div class="section-title">Background Color</div>
        <input type="text" id="imgColor" placeholder="Color (e.g. #D4C5B9)" value="#D4C5B9">
        
        <button class="primary generate-btn" onclick="generateImage()">GENERATE & DOWNLOAD</button>
        
        <div class="image-preview" id="previewBox">Download ready 🖼️</div>
    </div>
</div>

<div id="toast">Clipboard Copied! ✨</div>
<canvas id="canvas" style="display:none;"></canvas>

<script src="js/main.js"></script>
<script src="js/text-gen.js"></script>
<script src="js/image-gen.js"></script>
</body>
</html>
